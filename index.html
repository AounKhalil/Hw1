<!DOCTYPE html>
<head>
<title>homework </title>

<style>
table {
  border-collapse: collapse;
}

td {
  width: 50px;
  height: 50px;
  border: 1px solid rgb(234, 255, 0);
  text-align: center;
  position: relative;
}
tr:hover td {
  background-color: rgb(0, 191, 255);
}

td:hover::after {
  content: "";
  position: absolute;
  top: -500px;
  bottom: -500px;
  left: 0;
  right: 0;
  background-color: rgb(255, 65, 211);
  z-index: -1;
}
td:hover {
  background-color: rgb(0, 255, 34);
}
</style>

</head>
<body>

<table>
  <tr><td>1</td><td>2</td><td>3</td></tr>
  <tr><td>4</td><td>5</td><td>6</td></tr>
  <tr><td>7</td><td>8</td><td>9</td></tr>
</table>

</body>
</html>
